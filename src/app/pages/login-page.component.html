<section class="login-page">
  <div class="login-page__hero">
    <img
      class="login-page__brand"
      src="/img/logo_oficial_site.png"
      alt="Logo oficial Open Finance Brasil Santander"
    />
    <h1>Gestão de tickets OpenFinance</h1>
    <p>Acesse o portal para triagem, direcionamento e acompanhamento dos tickets.</p>
  </div>

  <form class="login-card" (ngSubmit)="submit()">
    <label class="login-card__field">
      <span>Usuário (e-mail)</span>
      <input
        type="email"
        name="email"
        [(ngModel)]="email"
        autocomplete="username"
        placeholder="seu.email@empresa.com.br"
      />
    </label>

    @if (errorMessage) {
      <div class="login-card__error">{{ errorMessage }}</div>
    }

    <button type="submit" class="login-card__submit" [disabled]="isSubmitting">
      @if (isSubmitting) {
        <span>Entrando...</span>
      } @else {
        <span>Entrar</span>
      }
    </button>
  </form>
</section>
